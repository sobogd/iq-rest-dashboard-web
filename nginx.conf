server {
    listen 80;
    server_name dashboard.iq-rest.com;

    root /home/deploy/apps/iq-rest-dashboard/dashboard;
    index index.html;

    # Long-cache hashed assets, immutable.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No-cache index.html so deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — every other path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
